name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  GAME_NAME: the-cube-game

jobs:
  create-tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate and create tag
        id: tag
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          TAG="${VERSION_INPUT}"
          if [ -z "${TAG}" ]; then
            echo "Version is required"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin"
            exit 1
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

  build:
    name: Export builds
    needs: create-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: Windows Desktop
            artifact_name: windows-build
            artifact_path: build/windows
          - preset: Linux
            artifact_name: linux-build
            artifact_path: build/linux
          - preset: Web
            artifact_name: web-build
            artifact_path: build/web
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.inputs.version }}
          submodules: recursive

      - name: Export ${{ matrix.preset }}
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./
          cache: true
          presets_to_export: ${{ matrix.preset }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  deploy-itch:
    name: Upload to itch.io
    needs:
      - create-tag
      - build
    runs-on: ubuntu-latest
    env:
      BUTLER_API_KEY: ${{ secrets.ITCHIO_API_KEY }}
      ITCHIO_TARGET: ${{ secrets.ITCHIO_PROJECT }}
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Validate itch.io secrets
        run: |
          set -euo pipefail
          if [ -z "${BUTLER_API_KEY}" ] || [ -z "${ITCHIO_TARGET}" ]; then
            echo "Missing required secrets: ITCHIO_API_KEY and/or ITCHIO_PROJECT"
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Install Butler
        run: |
          sudo apt-get install curl unzip
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip -o butler.zip -d butler
          chmod +x butler/butler

      - name: Push builds to itch.io
        run: |
          set -euo pipefail
          ./butler/butler push dist/windows-build "${ITCHIO_TARGET}:windows" --userversion "${VERSION}"
          ./butler/butler push dist/linux-build "${ITCHIO_TARGET}:linux" --userversion "${VERSION}"
          ./butler/butler push dist/web-build "${ITCHIO_TARGET}:html5" --userversion "${VERSION}"

  create-release:
    name: Publish GitHub Release
    needs:
      - create-tag
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          (cd dist/windows-build && zip -r "../../release/${GAME_NAME}-windows.zip" .)
          (cd dist/linux-build && zip -r "../../release/${GAME_NAME}-linux.zip" .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            release/${{ env.GAME_NAME }}-windows.zip
            release/${{ env.GAME_NAME }}-linux.zip
